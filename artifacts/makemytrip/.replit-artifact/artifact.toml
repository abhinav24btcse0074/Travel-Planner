kind = "web"
previewPath = "/"
title = "MakeMyTrip Clone"
version = "1.0.0"
id = "artifacts/makemytrip"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22363
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/makemytrip run dev"

[services.env]
PORT = "22363"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/makemytrip", "run", "build"]
publicDir = "artifacts/makemytrip/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
